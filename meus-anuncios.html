<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus Anúncios - Ocean Coffee</title>
    <link rel="icon" href="IMG/Loginho2.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="CSS/styles.css">
    <style>
        /* ESTILOS GERAIS */
        :root {
            --color-primary: #0047a3;
            --color-danger: #dc3545;
            --color-success: #28a745;
            --color-warning: #ffc107;
            --color-text: #212529;
            --color-text-muted: #6c757d;
            --color-background: #f8f9fa;
            --color-surface: #ffffff;
            --color-border: #e9ecef;
            --font-family-main: 'Inter', sans-serif;
        }

        body {
            background-color: var(--color-background);
            font-family: var(--font-family-main);
            color: var(--color-text);
            margin: 0;
        }

        .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .dashboard-main { overflow-y: auto; padding: 2.5rem; }

        /* SIDEBAR (Desktop) */
        .dashboard-sidebar { background-color: var(--color-surface); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; padding: 1.5rem; }
        .sidebar-header { padding: 0 0.5rem 1.5rem 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); text-align: center; }
        .sidebar-header .logo-img { height: 50px; }
        .user-profile-summary { text-align: center; margin-bottom: 2rem; }
        .user-profile-summary .avatar { width: 80px; height: 80px; border-radius: 50%; background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 600; margin: 0 auto 1rem auto; }
        .user-profile-summary h3 { font-size: 1.1rem; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; font-weight: 600; margin: 0; }
        .user-profile-summary p { font-size: 0.875rem; color: var(--color-text-muted); word-break: break-all; }
        .sidebar-nav { flex-grow: 1; display: flex; flex-direction: column; }
        .sidebar-nav-main { display: flex; flex-direction: column; gap: 0.5rem; }
        .sidebar-nav-logout { margin-top: auto; }
        .sidebar-nav a { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1rem; border-radius: 8px; text-decoration: none; color: var(--color-text-muted); font-weight: 500; transition: all 0.2s ease; }
        .sidebar-nav a:hover { background-color: var(--color-background); color: var(--color-text); }
        .sidebar-nav a.active { background-color: var(--color-primary); color: white; }
        .sidebar-nav a i { width: 20px; text-align: center; font-size: 1.1rem; }
        #logout-btn:hover { color: var(--color-danger); background-color: #fbebee; }
        .action-btn.edit:hover { color: var(--color-primary); }

        /* CONTEÚDO PRINCIPAL E CARDS DE ANÚNCIO */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 2rem; font-weight: 700; margin: 0; }
        .ad-list { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .ad-card { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; padding: 1rem; transition: box-shadow 0.2s ease, opacity 0.5s ease; overflow: hidden; }
        .ad-card:hover { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        .ad-image { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .ad-info { flex-grow: 1; min-width: 0; }
        .ad-info h3 { font-size: 1.05rem; font-family: var(--font-family-main); font-weight: 600; margin: 0 0 0.25rem 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ad-info p { margin: 0 0 0.25rem 0; color: var(--color-text-muted); font-size: 0.9rem; }
        .ad-price { font-size: 1rem; font-weight: 500; color: var(--color-primary); }
        
        .ad-status-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; margin-left: auto; }
        .status-container { display: flex; align-items: center; gap: 8px; position: relative; }
        .ad-status { display: inline-block; padding: 4px 10px; font-size: 0.8rem; font-weight: 600; border-radius: 20px; color: white; }

        .ad-status.aprovados { background-color: var(--color-success); }
        .ad-status.pendentes { background-color: var(--color-warning); color: var(--color-text); }
        .ad-status.rejeitados { background-color: var(--color-danger); }
        .ad-status.offline-sync { background-color: #6c757d; } /* COR DO STATUS OFFLINE */

        .ad-actions { display: flex; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--color-text-muted); font-size: 1.1rem; padding: 5px; transition: color 0.2s; }
        .action-btn.delete:hover { color: var(--color-danger); }
        
        .rejection-reason-icon { color: var(--color-text-muted); cursor: pointer; font-size: 1.2rem; }
        .notification-badge { position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background-color: var(--color-danger); border-radius: 50%; border: 2px solid var(--color-surface); }
        .rejection-reason-box { display: none; width: 100%; background-color: #fff8f8; border: 1px solid #f9c5c5; border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; color: var(--color-danger); }
        .rejection-reason-box.visible { display: block; }
        
        /* FILTROS */
        .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: 0.5rem; flex-wrap: wrap; }
        .filter-btn { background-color: transparent; border: none; padding: 0.625rem 1rem; border-radius: 6px; font-family: var(--font-family-main); font-size: 0.9rem; font-weight: 500; color: var(--color-text-muted); cursor: pointer; transition: all 0.2s ease; }
        .filter-btn:hover { background-color: var(--color-background); color: var(--color-text); }
        .filter-btn.active { background-color: var(--color-primary); color: white; }

        #no-ads-message { text-align: center; padding: 4rem; background-color: var(--color-surface); border-radius: 12px; border: 1px dashed var(--color-border); }
        #no-ads-message h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        #no-ads-message p { color: var(--color-text-muted); margin-bottom: 1.5rem; }
        .new-ad-btn { display: inline-block; text-decoration: none; background-color: var(--color-primary); color: white; padding: 0.875rem 1.5rem; border-radius: 8px; font-weight: 500; transition: background-color 0.2s; }
        .new-ad-btn:hover { background-color: #00337a; }
        
        .pagination-container { display: flex; justify-content: space-between; align-items: center; padding-top: 2rem; margin-top: 1rem; border-top: 1px solid var(--color-border); }
        .pagination-info { font-size: 0.9rem; color: var(--color-text-muted); }
        .pagination-controls { display: flex; align-items: center; gap: 5px; }
        .pagination-controls button { background-color: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .pagination-controls button:hover:not(:disabled) { background-color: var(--color-primary); color: white; border-color: var(--color-primary); }
        .pagination-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-controls button.active { background-color: var(--color-primary); color: white; border-color: var(--color-primary); }

        /* ESTILOS DOS POP-UPS */
        .popup-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .popup { display: flex; align-items: center; min-width: 300px; padding: 16px 22px; border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); transform: translateX(calc(100% + 20px)); opacity: 0; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); pointer-events: all; }
        .popup.show { transform: translateX(0); opacity: 1; }
        .popup.success { background-color: #28a745; }
        .popup.error { background-color: #dc3545; }
        .popup.info { background-color: #0d6efd; }
        
        .confirmation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .confirmation-overlay.show { opacity: 1; pointer-events: auto; }
        .confirmation-modal { background-color: white; padding: 2rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; transform: scale(0.9); opacity: 0; transition: all 0.3s ease; }
        .confirmation-overlay.show .confirmation-modal { transform: scale(1); opacity: 1; }
        .confirmation-actions { display: flex; gap: 1rem; justify-content: center; }
        .confirmation-actions button { border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500; font-size: 1rem; cursor: pointer; }
        .confirmation-btn-cancel { background-color: #e9ecef; color: #495057; }
        .confirmation-btn-confirm { background-color: #dc3545; color: white; }

        .mobile-header, .mobile-nav, .nav-overlay { display: none; }
       @media (max-width: 992px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .dashboard-sidebar { display: none; }
            .dashboard-main { padding: 1.5rem; padding-top: 80px; }
            .ad-card { flex-direction: column; align-items: flex-start; }
            .ad-card > * { width: 100%; }
            .ad-image { width: 100%; height: 150px; margin-bottom: 0.5rem; }
            .ad-status-actions { flex-direction: row; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
            
            .mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem; height: 60px; background-color: var(--color-surface); border-bottom: 1px solid var(--color-border); position: fixed; top: 0; left: 0; width: 100%; z-index: 100; }
            .mobile-header .logo-img { height: 35px; }
            .menu-toggle { background: none; border: none; font-size: 1.5rem; color: var(--color-text); cursor: pointer; }

            /* Estilos do Menu Mobile padronizados */
            .mobile-nav {
                display: flex;
                flex-direction: column;
                position: fixed; top: 0; left: -100%; width: 80%; max-width: 300px;
                height: 100vh;
                background-color: var(--color-surface); z-index: 110;
                transition: left 0.3s ease-in-out;
                padding: 0;
                box-shadow: 5px 0 15px rgba(0,0,0,0.1);
                overflow: hidden;
            }
            .mobile-nav.is-open { left: 0; }

            .mobile-nav .sidebar-header {
                padding: 1.5rem;
                padding-bottom: 1rem;
                flex-shrink: 0;
                border-bottom: 1px solid var(--color-border);
                text-align: center;
                margin-bottom: 0;
            }
            .mobile-nav .sidebar-header .logo-img {
                height: 40px; width: auto; margin: 0 auto;
            }
            .mobile-nav .sidebar-header h3 {
                margin-top: 0.5rem; font-size: 1.1rem; font-weight: 600;
            }

            .mobile-nav-links {
                gap: 0.75rem;
                flex-grow: 1;
                overflow-y: auto;
                padding: 1.5rem;
                padding-bottom: 1rem;
                display: flex;
                flex-direction: column;
            }
            .mobile-nav-links a {
                color: var(--color-text-muted); text-decoration: none; font-size: 1.1rem;
                font-weight: 500; padding: 1rem; border-radius: 8px;
                display: flex; align-items: center; gap: 1rem;
                transition: background-color 0.2s;
            }
            .mobile-nav-links a:hover { background-color: var(--color-background); }
            .mobile-nav-links a.active { background-color: var(--color-primary); color: white; }
            .mobile-nav-links a i { width: 20px; text-align: center; }

            .mobile-logout {
                padding: 1.5rem;
                padding-top: 1rem;
                border-top: 1px solid var(--color-border);
                flex-shrink: 0;
            }
            #mobile-logout-btn {
                display: flex; align-items: center; gap: 1rem; padding: 1rem;
                color: var(--color-text-muted); text-decoration: none; font-size: 1.1rem;
                font-weight: 500; border-radius: 8px; transition: background-color 0.2s, color 0.2s;
            }
            #mobile-logout-btn:hover { background-color: #fbebee; color: var(--color-danger); }
            #mobile-logout-btn i { width: 20px; text-align: center; }

            .nav-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 105; }
            .nav-overlay.is-open { display: block; }
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header"><a href="index.html"><img src="IMG/Loginho2.png" alt="Logo" class="logo-img"></a></div>
            <div class="user-profile-summary">
                <div class="avatar" id="avatar-inicial"></div>
                <h3 id="welcome-message">Carregando...</h3>
                <p id="user-email-sidebar"></p>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-main">
                    <a href="perfil.html"><i class="fas fa-user-circle"></i><span>Meu Perfil</span></a>
                    <a href="meus-anuncios.html" class="active"><i class="fas fa-bullhorn"></i><span>Meus Anúncios</span></a>
                    <a href="anuncie.html"><i class="fas fa-plus-circle"></i><span>Anunciar Novo</span></a>
                </div>
                <div class="sidebar-nav-logout"><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a></div>
            </nav>
        </aside>

        <main class="dashboard-main">
            <header class="mobile-header">
                <a href="index.html"><img src="IMG/Loginho2.png" alt="Logo" class="logo-img" style="height: 35px;"></a>
                <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
            </header>

            <div class="page-header">
                <h1>Meus Anúncios</h1>
            </div>

            <div class="filter-bar" id="filter-bar">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="aprovados">Aprovados</button>
                <button class="filter-btn" data-filter="pendentes">Pendentes</button>
                <button class="filter-btn" data-filter="rejeitados">Rejeitados</button>
            </div>

            <div class="ad-list" id="ad-list"></div>
            <div id="no-ads-message" style="display: none;">
                <h2>Você ainda não tem anúncios.</h2>
                <p>Que tal criar seu primeiro anúncio e começar a vender?</p>
                <a href="anuncie.html" class="new-ad-btn"><i class="fas fa-plus-circle"></i> Anunciar Agora</a>
            </div>
            <div id="pagination-container" class="pagination-container"></div>
        </main>
    </div>

    <div class="nav-overlay" id="nav-overlay"></div>
    <nav class="mobile-nav" id="mobile-nav">
        <div class="sidebar-header">
             <a href="index.html"><img src="IMG/Loginho2.png" alt="Logo Ocean Coffee" class="logo-img"></a>
            <h3 id="mobile-welcome-message">Olá!</h3>
        </div>
        <div class="mobile-nav-links">
            <a href="perfil.html"><i class="fas fa-user-circle"></i><span>Meu Perfil</span></a>
            <a href="meus-anuncios.html" class="active"><i class="fas fa-bullhorn"></i><span>Meus Anúncios</span></a>
            <a href="anuncie.html"><i class="fas fa-plus-circle"></i><span>Anunciar Novo</span></a>
        </div>
        <div class="mobile-logout">
             <a href="#" id="mobile-logout-btn" class="sair"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
        </div>
    </nav>

<script>
        // --- SEÇÃO BÁSICA DE SEGURANÇA E UI ---
        function protegerPagina() {
            const usuario = localStorage.getItem("usuarioLogado");
            if (!usuario) { window.location.replace('Login.html'); return null; }
            return JSON.parse(usuario);
        }
        const user = protegerPagina();

        function ensurePopupContainer() { let c = document.getElementById('popup-container'); if (!c) { c = document.createElement('div'); c.id = 'popup-container'; c.className = 'popup-container'; document.body.appendChild(c); } return c; }
        function showPopup(message, type = 'info', duration = 3500) {
            const c = ensurePopupContainer();
            const p = document.createElement('div'); p.className = `popup ${type}`;
            let i = 'fas fa-info-circle';
            if (type === 'success') i = 'fas fa-check-circle';
            if (type === 'error') i = 'fas fa-times-circle';
            p.innerHTML = `<i class="${i}"></i> <div>${message}</div>`;
            c.prepend(p);
            requestAnimationFrame(() => p.classList.add('show'));
            setTimeout(() => { p.classList.remove('show'); p.addEventListener('transitionend', () => p.remove()); }, duration);
        }

        function showConfirmationPopup(title, message, options = {}) {
            const { confirmText = 'Sim', cancelText = 'Cancelar' } = options;
            return new Promise((resolve) => {
                const o = document.createElement('div'); o.className = 'confirmation-overlay';
                o.innerHTML = `<div class="confirmation-modal"><h3>${title}</h3><p>${message}</p><div class="confirmation-actions"><button class="confirmation-btn-cancel">${cancelText}</button><button class="confirmation-btn-confirm">${confirmText}</button></div></div>`;
                const close = (result) => { o.classList.remove('show'); o.addEventListener('transitionend', () => { o.remove(); resolve(result); }); };
                o.querySelector('.confirmation-btn-cancel').addEventListener('click', () => close(false));
                o.querySelector('.confirmation-btn-confirm').addEventListener('click', () => close(true));
                document.body.appendChild(o);
                requestAnimationFrame(() => o.classList.add('show'));
            });
        }

        // =============================================================
        // GERENCIAR COFRE OFFLINE (VERSÃO 3)
        // =============================================================
        function abrirBanco() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('OceanCoffeeDB', 3);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('anuncios_pendentes')) db.createObjectStore('anuncios_pendentes', { keyPath: 'id', autoIncrement: true });
                    if (!db.objectStoreNames.contains('edicoes_pendentes')) db.createObjectStore('edicoes_pendentes', { keyPath: 'id_local', autoIncrement: true });
                    if (!db.objectStoreNames.contains('exclusoes_pendentes')) db.createObjectStore('exclusoes_pendentes', { keyPath: 'id_local', autoIncrement: true });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = reject;
            });
        }

        async function lerAnunciosOffline() {
            try {
                const db = await abrirBanco();
                const tx = db.transaction('anuncios_pendentes', 'readonly');
                const req = tx.objectStore('anuncios_pendentes').getAll();
                return new Promise(res => { req.onsuccess = () => res((req.result || []).filter(ad => ad.usuario_id == user.id)); });
            } catch { return []; }
        }

        // LER QUAIS ANÚNCIOS ESTÃO NA "LIXEIRA" OFFLINE PARA ESCONDÊ-LOS DA TELA
        async function lerExclusoesOffline() {
            try {
                const db = await abrirBanco();
                const tx = db.transaction('exclusoes_pendentes', 'readonly');
                const req = tx.objectStore('exclusoes_pendentes').getAll();
                return new Promise(res => { req.onsuccess = () => res((req.result || []).map(ad => String(ad.anuncio_id))); });
            } catch { return []; }
        }

        // GUARDAR ORDEM DE EXCLUIR QUANDO SEM INTERNET
        async function guardarExclusaoOffline(adId) {
            const db = await abrirBanco();
            const tx = db.transaction('exclusoes_pendentes', 'readwrite');
            tx.objectStore('exclusoes_pendentes').add({ anuncio_id: adId, data_exclusao: new Date().toISOString() });
            return new Promise(res => { tx.oncomplete = res; });
        }

        // AVISO DO ROBÔ QUANDO A INTERNET VOLTA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'SYNC_COMPLETO') { loadAds(); }
            });
        }

        document.addEventListener("DOMContentLoaded", async () => {
            if (user) {
                const firstName = user.nome.split(' ')[0];
                document.getElementById('welcome-message').textContent = firstName;
                document.getElementById('mobile-welcome-message').textContent = `Olá, ${firstName}!`;
                document.getElementById('user-email-sidebar').textContent = user.email;
                document.getElementById('avatar-inicial').textContent = user.nome.charAt(0).toUpperCase();
            }

            const adList = document.getElementById('ad-list');
            const noAdsMessage = document.getElementById('no-ads-message');
            const filterBar = document.getElementById('filter-bar');
            let allUserAds = [];
            let filteredAds = [];
            let currentPage = 1;
            const rowsPerPage = 5;

            window.loadAds = async function() {
                adList.innerHTML = '<p style="text-align: center; padding: 2rem;">Carregando...</p>';
                try {
                    let onlineAds = [];
                    const anunciosExcluidosOffline = await lerExclusoesOffline();

                    try {
                        const response = await fetch(`listar_meus_anuncios.php?usuario_id=${user.id}`);
                        const data = await response.json();
                        if (data.status === true) {
                            onlineAds = data.produtos
                                .filter(ad => !anunciosExcluidosOffline.includes(String(ad.id))) // MÁGICA: Esconde da tela os que já foram excluídos offline!
                                .map(ad => ({
                                ...ad,
                                status: ad.status_aprovacao === 'aprovado' ? 'aprovados' : (ad.status_aprovacao === 'rejeitado' ? 'rejeitados' : 'pendentes')
                            }));
                        }
                    } catch(e) { console.log('Sem servidor no momento.'); }

                    const offlineAdsDB = await lerAnunciosOffline();
                    const formattedOfflineAds = offlineAdsDB.map(ad => ({
                        id: 'offline-' + ad.id,
                        titulo: ad.titulo,
                        preco: ad.preco,
                        status: 'pendentes',
                        isOffline: true, 
                        imagem_0: ad.imagem_0 ? URL.createObjectURL(ad.imagem_0) : 'IMG/placeholder.png'
                    }));

                    allUserAds = [...formattedOfflineAds, ...onlineAds];
                    displayPage();
                    
                } catch (error) {
                    adList.innerHTML = '<p style="text-align: center; padding: 2rem; color: red;">Falha ao carregar anúncios.</p>';
                }
            }

            function displayPage() {
                const currentFilter = document.querySelector('.filter-btn.active').dataset.filter;
                filteredAds = allUserAds;
                if (currentFilter !== 'todos') filteredAds = allUserAds.filter(ad => ad.status === currentFilter);
                renderAds(filteredAds);
                setupPagination(filteredAds);
            }
            
            function renderAds(ads) {
                adList.innerHTML = '';
                const startIndex = (currentPage - 1) * rowsPerPage;
                const paginatedItems = ads.slice(startIndex, startIndex + rowsPerPage);

                if (ads.length === 0) {
                    noAdsMessage.style.display = 'block';
                    noAdsMessage.querySelector('h2').textContent = `Você não tem anúncios.`;
                } else {
                    noAdsMessage.style.display = 'none';
                    paginatedItems.forEach(ad => {
                        const adCard = document.createElement('div');
                        adCard.className = 'ad-card';
                        adCard.dataset.id = ad.id;

                        let statusClass = ad.isOffline ? 'offline-sync' : ad.status;
                        let statusText = { aprovados: 'Aprovado', pendentes: 'Pendente', rejeitados: 'Rejeitado' }[ad.status];
                        
                        if(ad.isOffline) statusText = '<i class="fas fa-wifi" style="margin-right:5px; opacity:0.7;"></i> Aguardando Rede';
                        
                        let reasonIconHtml = '';
                        if (ad.status === 'rejeitados' && ad.motivo_rejeicao) reasonIconHtml = `<div class="status-container"><i class="fas fa-envelope rejection-reason-icon"></i></div>`;

                        const imagemSrc = ad.imagem_0 ? ad.imagem_0 : 'IMG/placeholder.png';

                        const botoesAcao = ad.isOffline ? `
                            <div class="ad-actions">
                                <button class="action-btn delete" title="Cancelar envio offline"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        ` : `
                            <div class="ad-actions">
                                ${ad.status === 'pendentes' || ad.status === 'rejeitados' ? `<a href="editar-anuncio.html?id=${ad.id}" class="action-btn edit"><i class="fas fa-pencil-alt"></i></a>` : ''}
                                <button class="action-btn delete" title="Excluir anúncio"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        `;

                        adCard.innerHTML = `
                            <img src="${imagemSrc}" class="ad-image">
                            <div class="ad-info">
                                <h3>${ad.titulo}</h3>
                                <p class="ad-price">${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(ad.preco)}</p>
                            </div>
                            <div class="ad-status-actions">
                                <div class="status-container">
                                    <span class="ad-status ${statusClass}">${statusText}</span>
                                    ${reasonIconHtml}
                                </div>
                                ${botoesAcao}
                            </div>
                            ${ad.motivo_rejeicao ? `<div class="rejection-reason-box">${ad.motivo_rejeicao}</div>` : ''}
                        `;
                        adList.appendChild(adCard);
                    });
                }
            }

            function setupPagination(ads) {
                const paginationContainer = document.getElementById("pagination-container");
                paginationContainer.innerHTML = "";
                const pageCount = Math.ceil(ads.length / rowsPerPage);
                if (pageCount <= 1) return;
                const controls = document.createElement('div'); controls.className = 'pagination-controls';
                const createBtn = (text, page, isDis = false, isAct = false) => {
                    const b = document.createElement('button'); b.innerHTML = text; b.disabled = isDis;
                    if (isAct) b.classList.add('active');
                    if (page) b.addEventListener('click', () => { currentPage = page; displayPage(); });
                    return b;
                };
                controls.appendChild(createBtn('&laquo;', currentPage - 1, currentPage === 1));
                for (let i = 1; i <= pageCount; i++) controls.appendChild(createBtn(i, i, false, i === currentPage));
                controls.appendChild(createBtn('&raquo;', currentPage + 1, currentPage === pageCount));
                paginationContainer.appendChild(controls);
            }
            
            filterBar.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    e.target.classList.add('active');
                    currentPage = 1; displayPage();
                }
            });

            // ==========================================================
            // EXCLUSÃO BLINDADA (ONLINE E OFFLINE)
            // ==========================================================
            adList.addEventListener('click', async (e) => {
                if (e.target.classList.contains('rejection-reason-icon')) {
                    const adCard = e.target.closest('.ad-card');
                    const reasonBox = adCard.querySelector('.rejection-reason-box');
                    if (reasonBox) reasonBox.classList.toggle('visible');
                    return;
                }

                const deleteButton = e.target.closest('.delete');
                if (deleteButton) {
                    const adCard = deleteButton.closest('.ad-card');
                    const adId = adCard.dataset.id;

                    const msg = String(adId).startsWith('offline-') 
                        ? 'Deseja cancelar o envio deste anúncio que está aguardando internet?' 
                        : 'Tem certeza que deseja excluir este anúncio permanentemente?';

                    const confirmed = await showConfirmationPopup('Excluir Anúncio', msg, { confirmText: 'Sim, Excluir' });

                    if (confirmed) {
                        // 1. CANCELAR ANÚNCIO NOVO QUE AINDA NEM SUBIU (OFFLINE)
                        if (String(adId).startsWith('offline-')) {
                            const idLocal = parseInt(adId.replace('offline-', ''));
                            const db = await abrirBanco();
                            const tx = db.transaction('anuncios_pendentes', 'readwrite');
                            tx.objectStore('anuncios_pendentes').delete(idLocal);
                            tx.oncomplete = () => {
                                showPopup('Anúncio cancelado!', 'success');
                                loadAds();
                            };
                            return;
                        }

                        // 2. EXCLUIR ANÚNCIO REAL (ONLINE OU SEM INTERNET)
                        try {
                            const response = await fetch('excluir_anuncio.php', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id: adId })
                            });
                            const data = await response.json();
                            
                            if(data.status === true) {
                                showPopup('Anúncio excluído com sucesso!', 'success');
                                allUserAds = allUserAds.filter(ad => ad.id != adId);
                                displayPage();
                            } else { throw new Error(data.mensagem); }
                            
                        } catch (networkError) {
                            // INTERNET CAIU? GUARDA NA GAVETA DE EXCLUSÃO
                            if (!navigator.onLine || networkError.message.includes('Failed to fetch') || networkError.message.includes('NetworkError')) {
                                await guardarExclusaoOffline(adId);
                                
                                if ('serviceWorker' in navigator && 'SyncManager' in window) {
                                    const sw = await navigator.serviceWorker.ready;
                                    await sw.sync.register('excluir-anuncios-offline');
                                    
                                    showPopup("Sem internet! A exclusão foi agendada e será feita quando a conexão voltar.", "info", 5000);
                                    
                                    // Removemos o anúncio da tela instantaneamente
                                    allUserAds = allUserAds.filter(ad => ad.id != adId);
                                    displayPage();
                                }
                            } else {
                                showPopup(`Erro ao excluir: ${networkError.message}`, 'error');
                            }
                        }
                    }
                }
            });

            await loadAds();
            
            // Logout e Menu Mobile
            async function handleLogout(e) { e.preventDefault(); const confirmed = await showConfirmationPopup('Confirmar Saída', 'Deseja sair da conta?', { confirmText: 'Sair' }); if (confirmed) { localStorage.removeItem("usuarioLogado"); window.location.replace("index.html"); } }
            document.getElementById('logout-btn')?.addEventListener('click', handleLogout); document.getElementById('mobile-logout-btn')?.addEventListener('click', handleLogout);
            const menuToggle = document.getElementById('menu-toggle'); const mobileNav = document.getElementById('mobile-nav'); const navOverlay = document.getElementById('nav-overlay');
            function closeMenu() { mobileNav?.classList.remove('is-open'); navOverlay?.classList.remove('is-open'); }
            menuToggle?.addEventListener('click', () => { mobileNav.classList.add('is-open'); navOverlay.classList.add('is-open'); }); navOverlay?.addEventListener('click', closeMenu);
        });
    </script>
</body>
</html>
